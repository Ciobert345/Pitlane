 [build]
   base = "dashboard"
   command = "yarn build"
   publish = ".next"

   [build.environment]
     # Valori di default solo per far passare la validazione Zod su Netlify.
     # Sostituiscili con gli URL pubblici reali dei tuoi servizi API e realtime
     # quando li avrai deployati (es. https://api.tuodominio.com, https://realtime.tuodominio.com).
     API_URL = "https://example.com"
     NEXT_PUBLIC_LIVE_URL = "https://example.com"

 [[plugins]]
   package = "@netlify/plugin-nextjs"
